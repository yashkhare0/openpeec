<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenPeec Nodriver Fixture</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
        background: Canvas;
        color: CanvasText;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        margin: 64px auto;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 13px;
        font-weight: 600;
      }

      #prompt-textarea {
        min-height: 96px;
        border: 1px solid color-mix(in oklch, CanvasText 20%, Canvas);
        border-radius: 8px;
        padding: 12px;
        outline: none;
      }

      #prompt-textarea:focus {
        border-color: color-mix(in oklch, CanvasText 50%, Canvas);
      }

      button {
        margin-top: 12px;
        height: 36px;
        border: 0;
        border-radius: 6px;
        padding: 0 14px;
        background: CanvasText;
        color: Canvas;
        font-weight: 600;
      }

      [data-message-author-role="assistant"] {
        margin-top: 24px;
        border: 1px solid color-mix(in oklch, CanvasText 16%, Canvas);
        border-radius: 8px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="prompt-textarea">Prompt</label>
      <div
        id="prompt-textarea"
        contenteditable="true"
        role="textbox"
        aria-label="Prompt"
      ></div>
      <button type="button" data-testid="send-button" aria-label="Send prompt">
        Send
      </button>
      <section id="responses" aria-live="polite"></section>
    </main>
    <script>
      const input = document.querySelector("#prompt-textarea");
      const send = document.querySelector("[data-testid='send-button']");
      const responses = document.querySelector("#responses");

      function submitPrompt() {
        const prompt = (input.innerText || input.textContent || "").trim();
        if (!prompt) return;

        responses.innerHTML = `
          <article data-message-author-role="assistant" data-message-id="fixture-response">
            <p>
              OpenPeec tracks how a brand appears in AI answer surfaces. The
              nodriver fixture received: ${prompt.replace(/[<>&]/g, "")}
            </p>
            <p>
              Useful references:
              <a href="https://example.com/openpeec-guide">OpenPeec guide</a>
              and
              <a href="https://docs.example.com/ai-visibility">AI visibility docs</a>.
            </p>
          </article>
        `;
        input.textContent = "";
      }

      send.addEventListener("click", submitPrompt);
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          submitPrompt();
        }
      });
    </script>
  </body>
</html>
